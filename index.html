<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daisy Admin — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0F1117;
      --sidebar:   #161B27;
      --card:      #1C2236;
      --border:    rgba(255,255,255,0.07);
      --rose:      #C85975;
      --rose-dim:  rgba(200,89,117,0.15);
      --rose-glow: rgba(200,89,117,0.35);
      --green:     #3ECF8E;
      --green-dim: rgba(62,207,142,0.12);
      --amber:     #F59E0B;
      --amber-dim: rgba(245,158,11,0.12);
      --red:       #EF4444;
      --red-dim:   rgba(239,68,68,0.12);
      --blue:      #60A5FA;
      --blue-dim:  rgba(96,165,250,0.12);
      --text:      #E2E8F0;
      --text-dim:  #8492A6;
      --text-faint:#4A5568;
      --r:         12px;
      --r-sm:      8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* ── LOGIN PAGE ─────────────────────────────── */
    #loginPage { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 380px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: fadeUp 0.4s ease both; }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--rose); margin-bottom: 0.3rem; }
    .login-sub  { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 2rem; }
    .lbl { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.4rem; }
    .linput { width: 100%; padding: 0.75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; margin-bottom: 1rem; }
    .linput:focus { border-color: var(--rose); }
    .login-btn { width: 100%; padding: 0.8rem; background: var(--rose); color: #fff; border: none; border-radius: var(--r-sm); font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 0.25rem; }
    .login-btn:hover { background: #a3415a; transform: translateY(-1px); }
    .login-err { color: var(--red); font-size: 0.78rem; margin-top: 0.75rem; text-align: center; min-height: 1.1rem; }

    /* ── SIDEBAR ────────────────────────────────── */
    #sidebar { width: 240px; flex-shrink: 0; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
    .sb-logo { padding: 1.5rem 1.4rem 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--rose); display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border); }
    .sb-section { padding: 1.2rem 0.75rem 0.4rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); }
    .sb-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1.1rem; border-radius: var(--r-sm); margin: 0.1rem 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.18s; border: none; background: none; width: calc(100% - 1rem); text-align: left; }
    .sb-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .sb-link.active { background: var(--rose-dim); color: var(--rose); }
    .sb-link .icon { font-size: 1.05rem; width: 20px; text-align: center; }
    .sb-badge { margin-left: auto; background: var(--rose); color: #fff; border-radius: 50px; font-size: 0.62rem; font-weight: 700; padding: 0.1rem 0.5rem; min-width: 18px; text-align: center; }
    .sb-footer { margin-top: auto; padding: 1rem; border-top: 1px solid var(--border); }
    .sb-store-link { display: flex; align-items: center; gap: 0.6rem; font-size: 0.78rem; color: var(--text-dim); cursor: pointer; text-decoration: none; transition: color 0.2s; }
    .sb-store-link:hover { color: var(--rose); }
    .logout-btn { display: flex; align-items: center; gap: 0.6rem; width: 100%; background: none; border: none; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 0.78rem; cursor: pointer; padding: 0.5rem 0; transition: color 0.2s; margin-top: 0.5rem; }
    .logout-btn:hover { color: var(--red); }

    /* ── MAIN AREA ──────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { padding: 1rem 1.75rem; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-title { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .topbar-sub   { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.1rem; }
    .topbar-actions { display: flex; gap: 0.6rem; align-items: center; }
    #content { flex: 1; overflow-y: auto; padding: 1.75rem; }

    /* ── STATS GRID ─────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.25rem; }
    .stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .stat-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .stat-trend { font-size: 0.7rem; font-weight: 600; padding: 0.18rem 0.5rem; border-radius: 50px; }
    .stat-val { font-size: 1.75rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 0.73rem; color: var(--text-dim); margin-top: 0.25rem; }

    /* ── SECTION HEADER ─────────────────────────── */
    .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .sec-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .sec-sub   { font-size: 0.73rem; color: var(--text-dim); margin-top: 0.1rem; }

    /* ── TABLE ──────────────────────────────────── */
    .tbl-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .tbl-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: rgba(255,255,255,0.03); padding: 0.7rem 1rem; text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.84rem; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── PRODUCT CARD THUMB ─────────────────────── */
    .p-thumb { width: 46px; height: 46px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; overflow: hidden; flex-shrink: 0; }
    .p-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .p-name-cell { display: flex; align-items: center; gap: 0.75rem; }
    .p-name { font-weight: 600; font-size: 0.87rem; color: var(--text); }
    .p-cat  { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.1rem; text-transform: capitalize; }

    /* ── BADGES ─────────────────────────────────── */
    .chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.22rem 0.65rem; border-radius: 50px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .chip-green  { background: var(--green-dim);  color: var(--green); }
    .chip-amber  { background: var(--amber-dim);  color: var(--amber); }
    .chip-red    { background: var(--red-dim);    color: var(--red); }
    .chip-blue   { background: var(--blue-dim);   color: var(--blue); }
    .chip-rose   { background: var(--rose-dim);   color: var(--rose); }
    .chip-gray   { background: rgba(255,255,255,0.07); color: var(--text-dim); }

    /* ── BUTTONS ────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: var(--r-sm); font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; white-space: nowrap; }
    .btn-rose   { background: var(--rose);  color: #fff; }
    .btn-rose:hover { background: #a3415a; }
    .btn-ghost  { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-danger { background: var(--red-dim); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-sm { padding: 0.32rem 0.75rem; font-size: 0.75rem; border-radius: 6px; }

    .status-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.28rem 0.55rem; font-size: 0.76rem; cursor: pointer; font-family: 'Inter', sans-serif; }

    /* ── MODAL ──────────────────────────────────── */
    .overlay { position: fixed; inset: 0; z-index: 8000; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 1rem; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; width: 100%; max-width: 660px; max-height: 92vh; overflow-y: auto; animation: fadeUp 0.25s ease; }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1.75rem 0; }
    .modal-ttl { font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .modal-sub { font-size: 0.74rem; color: var(--text-dim); margin-top: 0.2rem; }
    .modal-x { background: rgba(255,255,255,0.07); border: none; color: var(--text-dim); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .modal-x:hover { background: var(--red-dim); color: var(--red); }
    .modal-body { padding: 1.5rem 1.75rem; }
    .modal-ft { padding: 1rem 1.75rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* FORM FIELDS */
    .fg { margin-bottom: 1rem; }
    .fg label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-dim); margin-bottom: 0.35rem; }
    .fi { width: 100%; padding: 0.7rem 0.9rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; }
    .fi:focus { border-color: var(--rose); }
    .fi-sm { max-width: 180px; }
    textarea.fi { resize: vertical; min-height: 80px; }
    .fg small { font-size: 0.7rem; color: var(--text-faint); margin-top: 0.3rem; display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    
    .img-preview-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; }
    .img-prev-box { width: 64px; height: 64px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; flex-shrink: 0; }
    .img-prev-box img { width: 100%; height: 100%; object-fit: cover; }

    /* TOAST */
    #toastEl { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 0.65rem 1.4rem; border-radius: 50px; font-size: 0.84rem; font-weight: 600; z-index: 9999; display: none; animation: fadeUp 0.3s ease; white-space: nowrap; box-shadow: 0 4px 20px rgba(62,207,142,0.3); }
    #toastEl.err { background: var(--red); box-shadow: 0 4px 20px rgba(239,68,68,0.3); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
    .empty-state .ei { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state h3 { font-size: 1rem; color: var(--text); margin-bottom: 0.4rem; }
    .empty-state p  { font-size: 0.82rem; margin-bottom: 1.5rem; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    @media (max-width: 720px) {
      #sidebar { display: none; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🌸 Daisy Admin</div>
    <div class="login-sub">Knitted Bouquets Dashboard — Dharan</div>
    <label class="lbl">Username</label>
    <input class="linput" id="lu" type="text" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="lbl">Password</label>
    <input class="linput" id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="appShell" style="display:none;width:100%;overflow:hidden;">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">🌸 Daisy</div>
    <div class="sb-section">Main</div>
    <button class="sb-link active" id="nav-dashboard" onclick="navigateSection('dashboard')"><span class="icon">📊</span> Dashboard</button>
    <button class="sb-link" id="nav-products" onclick="navigateSection('products')"><span class="icon">🌸</span> Products</button>
    <button class="sb-link" id="nav-orders" onclick="navigateSection('orders')"><span class="icon">📦</span> Orders <span class="sb-badge" id="pendingBadge">0</span></button>
    <button class="sb-link" id="nav-settings" onclick="navigateSection('settings')"><span class="icon">⚙️</span> Settings</button>
    
    <div class="sb-footer">
      <a class="sb-store-link" href="index.html" target="_blank">🔗 View Store →</a>
      <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-sub" id="topbarSub">Welcome back, admin</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-rose" onclick="openModal(null)" id="topbarBtn" style="display:none;">+ Add Bouquet</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="toastEl"></div>

<script>
const PASS_HASH = 'daisy2024_placeholder'; 
const ADMIN_USER = 'admin';
const ADMIN_PASS_PLAIN = 'daisy2024'; 

async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── STATE ────────────────────────────────────
let PRODUCTS =[]; // Starts empty so you can add your own
let SETTINGS = { esewaNumber: '', deliveryFee: 100 };
let orders   = JSON.parse(localStorage.getItem('daisy_orders') || '[]');
let section  = 'dashboard';
let editingId = null;

const WORKER_URL      = 'https://weathered-waterfall-98de.t8169105.workers.dev/save';
const WORKER_PASSWORD = 'daisy123';
const WORKER_UPLOAD   = 'https://weathered-waterfall-98de.t8169105.workers.dev/upload';

let useLocalCache = false;

// Back button history setup
window.addEventListener('popstate', (e) => {
  const s = e.state ? e.state.section : 'dashboard';
  showSection(s, false); 
});

async function loadData() {
  if (useLocalCache) {
    useLocalCache = false;
    let localData = JSON.parse(localStorage.getItem('daisy_data') || 'null');
    if (localData) {
      PRODUCTS = localData.products ||[];
      SETTINGS = localData.settings || SETTINGS;
    }
    orders = JSON.parse(localStorage.getItem('daisy_orders') || '[]');
    return;
  }
  
  const repo = 'Daisy-flowers/Daisy';
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${repo}/main/data/products.json?t=${Date.now()}`);
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) {
        PRODUCTS = data;
      } else {
        PRODUCTS = data.products ||[];
        SETTINGS = data.settings || SETTINGS;
      }
      localStorage.setItem('daisy_data', JSON.stringify({ products: PRODUCTS, settings: SETTINGS }));
    } else {
      let localData = JSON.parse(localStorage.getItem('daisy_data') || 'null');
      if(localData){ PRODUCTS = localData.products ||[]; SETTINGS = localData.settings || SETTINGS; }
    }
  } catch(e) {
    let localData = JSON.parse(localStorage.getItem('daisy_data') || 'null');
    if(localData){ PRODUCTS = localData.products ||[]; SETTINGS = localData.settings || SETTINGS; }
  }
  orders = JSON.parse(localStorage.getItem('daisy_orders') || '[]');
}

async function saveAllData() {
  const payload = { products: PRODUCTS, settings: SETTINGS };
  localStorage.setItem('daisy_data', JSON.stringify(payload));
  useLocalCache = true; 

  if (WORKER_URL.includes('YOUR_WORKER')) {
    toast('Saved locally — set WORKER_URL in admin.html to sync online.');
    return;
  }

  toast('Syncing…');
  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: WORKER_PASSWORD, ...payload }),
    });
    const result = await resp.json();
    if (result.ok) {
      toast('Synced to GitHub ✓ — site updates in ~30s');
    } else {
      toast(`Error: ${result.error}`, true);
    }
  } catch (e) {
    toast('Worker unreachable — saved locally only', true);
  }
}

function saveOrders() { localStorage.setItem('daisy_orders', JSON.stringify(orders)); }

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const h = await hashStr(p);
  const ok = (u === ADMIN_USER) && (p === ADMIN_PASS_PLAIN || h === PASS_HASH);
  if (ok) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    navigateSection('dashboard');
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect username or password.';
  }
}
function doLogout() {
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

function navigateSection(s) {
  history.pushState({ section: s }, '', '?s=' + s);
  showSection(s, true);
}

async function showSection(s, pushHistory = true) {
  section = s;
  const c = document.getElementById('content');
  c.innerHTML = `<div style="color:var(--text-dim);padding:2rem;font-size:0.85rem;">Loading…</div>`;
  await loadData();

  document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
  const active = document.getElementById('nav-' + s);
  if (active) active.classList.add('active');

  const titles = { dashboard:'Dashboard', products:'Products', orders:'Orders', settings:'Settings' };
  const subs   = { dashboard:'Overview of your store', products:'Manage your knitted bouquets', orders:'Customer orders', settings:'Payment & Delivery Settings' };
  document.getElementById('topbarTitle').textContent = titles[s] || s;
  document.getElementById('topbarSub').textContent   = subs[s]  || '';
  const tb = document.getElementById('topbarBtn');
  
  if (s === 'products') { tb.style.display='inline-flex'; tb.onclick=()=>openModal(null); } else { tb.style.display='none'; }

  const pending = orders.filter(o=>o.status==='Processing').length;
  document.getElementById('pendingBadge').textContent = pending;

  if (s === 'dashboard') c.innerHTML = renderDashboard();
  else if (s === 'products') c.innerHTML = renderProducts();
  else if (s === 'orders') c.innerHTML = renderOrders();
  else if (s === 'settings') c.innerHTML = renderSettings();
}

function renderDashboard() {
  const totalRev = orders.filter(o=>o.status==='Delivered').reduce((s,o)=>s+o.total,0);
  const oos = PRODUCTS.filter(p=>Number(p.stock)<=0).length;
  const lowStock = PRODUCTS.filter(p=>Number(p.stock)>0&&Number(p.stock)<=5).length;
  const processing = orders.filter(o=>o.status==='Processing').length;
  const recent = orders.slice(0,5);

  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon" style="background:var(--rose-dim);color:var(--rose);">💰</div><div class="stat-trend chip chip-green">Revenue</div></div>
      <div class="stat-val">Rs. ${totalRev.toLocaleString()}</div>
      <div class="stat-label">Total from delivered orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon" style="background:var(--amber-dim);color:var(--amber);">⏳</div><div class="stat-trend chip chip-amber">Pending</div></div>
      <div class="stat-val">${processing}</div>
      <div class="stat-label">Orders processing</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon" style="background:var(--blue-dim);color:var(--blue);">📦</div><div class="stat-trend chip chip-blue">Total</div></div>
      <div class="stat-val">${orders.length}</div>
      <div class="stat-label">All-time orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon" style="background:var(--green-dim);color:var(--green);">🌸</div><div class="stat-trend chip chip-green">Active</div></div>
      <div class="stat-val">${PRODUCTS.length}</div>
      <div class="stat-label">Bouquets in catalogue</div>
    </div>
  </div>

  ${(oos>0||lowStock>0) && PRODUCTS.length > 0 ?`
  <div style="background:var(--amber-dim);border:1px solid rgba(245,158,11,0.25);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.75rem;display:flex;align-items:center;gap:0.75rem;">
    <span style="font-size:1.3rem;">⚠️</span>
    <div>
      <div style="font-size:0.85rem;font-weight:600;color:var(--amber);">Stock Alert</div>
      <div style="font-size:0.77rem;color:var(--text-dim);margin-top:0.2rem;">${oos>0?`<strong style="color:var(--red);">${oos} bouquet(s) out of stock</strong>. `:''}${lowStock>0?`${lowStock} bouquet(s) running low.`:''} <span style="cursor:pointer;text-decoration:underline;color:var(--amber);" onclick="navigateSection('products')">Manage stock →</span></div>
    </div>
  </div>`:''}

  <div class="sec-header">
    <div><div class="sec-title">Recent Orders</div><div class="sec-sub">Last ${recent.length} orders placed</div></div>
    <button class="btn btn-ghost btn-sm" onclick="navigateSection('orders')">View all →</button>
  </div>
  ${recent.length===0?`<div class="empty-state"><div class="ei">📦</div><h3>No orders yet</h3><p>Orders will appear here once customers check out.</p></div>`:
  `<div class="tbl-wrap"><div class="tbl-scroll"><table>
    <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${recent.map(o=>`<tr>
      <td><code style="font-size:0.75rem;color:var(--rose)">${o.id}</code></td>
      <td><div style="font-weight:600;">${o.name}</div><div style="font-size:0.72rem;color:var(--text-dim);">${o.phone}</div></td>
      <td style="font-weight:700;color:var(--rose)">Rs. ${o.total.toLocaleString()}</td>
      <td style="color:var(--text-dim);font-size:0.8rem;">${o.date}</td>
      <td>${statusChip(o.status)}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`}`;
}

function renderProducts() {
  if (PRODUCTS.length === 0) {
    return `
    <div class="empty-state" style="margin-top:4rem;">
      <div class="ei">🌸</div>
      <h3>Your Catalogue is Empty</h3>
      <p>Start adding your beautiful knitted creations here.</p>
      <button class="btn btn-rose" onclick="openModal(null)">+ Add First Bouquet</button>
    </div>`;
  }

  return `
  <div class="sec-header" style="margin-bottom:1.25rem;">
    <div><div class="sec-title">${PRODUCTS.length} Bouquets</div><div class="sec-sub">Click Edit to change price, stock, image, or any detail</div></div>
  </div>
  <div class="tbl-wrap"><div class="tbl-scroll">
    <table>
      <thead><tr><th>Bouquet</th><th>Category</th><th>Stock</th><th>Price</th><th>Badge</th><th>Actions</th></tr></thead>
      <tbody>
        ${PRODUCTS.map(p => {
          const stock = Number(p.stock);
          const stockEl = stock <= 0 ? `<span class="chip chip-red">Out of Stock</span>` : stock <= 5 ? `<span class="chip chip-amber">⚠ ${stock} left</span>` : `<span style="color:var(--green);font-weight:600;">✓ ${stock}</span>`;
          const thumb = p.imageUrl ? `<img src="${p.imageUrl}" onerror="this.parentElement.innerHTML='${p.emoji}'" style="width:100%;height:100%;object-fit:cover;">` : p.emoji;
          return `<tr>
            <td>
              <div class="p-name-cell">
                <div class="p-thumb">${thumb}</div>
                <div><div class="p-name">${p.name}</div><div class="p-cat">${p.cat}</div></div>
              </div>
            </td>
            <td style="text-transform:capitalize;color:var(--text-dim);font-size:0.8rem;">${p.cat}</td>
            <td>${stockEl}</td>
            <td style="font-weight:600;color:var(--rose);">Rs. ${(p.price || p.base || 0).toLocaleString()}</td>
            <td>${p.badge ? `<span class="chip chip-rose">${p.badge}</span>` : '<span style="color:var(--text-faint);">—</span>'}</td>
            <td>
              <div style="display:flex;gap:0.4rem;">
                <button class="btn btn-ghost btn-sm" onclick="openModal(${p.id})">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div></div>`;
}

function renderOrders() {
  if (!orders.length) return `<div class="empty-state"><div class="ei">📦</div><h3>No orders yet</h3><p>Orders placed on the store will appear here.</p></div>`;
  return `
  <div class="tbl-wrap"><div class="tbl-scroll">
    <table>
      <thead><tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Delivery Date</th><th>Total</th><th>Status</th><th>Update</th></tr></thead>
      <tbody>
        ${orders.map(o=>`<tr>
          <td><code style="font-size:0.75rem;color:var(--rose);">${o.id}</code></td>
          <td><div style="font-weight:600;">${o.name}</div><div style="font-size:0.72rem;color:var(--text-dim);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o.addr}</div></td>
          <td><a href="tel:${o.phone}" style="color:var(--rose);text-decoration:none;font-weight:600;">${o.phone}</a></td>
          <td style="color:var(--text-dim);font-size:0.8rem;">${o.items?o.items.length:1} item(s)</td>
          <td style="font-weight:500;">${o.date}</td>
          <td style="font-weight:700;color:var(--rose);">Rs. ${o.total.toLocaleString()}</td>
          <td>${statusChip(o.status)}</td>
          <td>
            <select class="status-select" onchange="updateStatus('${o.id}',this.value)">
              <option ${o.status==='Processing'?'selected':''}>Processing</option>
              <option ${o.status==='Out for Delivery'?'selected':''}>Out for Delivery</option>
              <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div></div>`;
}

function renderSettings() {
  return `
  <div class="sec-header">
    <div><div class="sec-title">Store Settings</div><div class="sec-sub">Update payment & delivery info shown to customers.</div></div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;max-width:480px;">
    <div class="fg">
      <label>eSewa Phone Number</label>
      <input class="fi" id="sEsewa" type="text" placeholder="e.g. 9812345678" value="${SETTINGS.esewaNumber}">
      <small>Customers will see this number to transfer money via eSewa during checkout.</small>
    </div>
    <div class="fg">
      <label>Standard Delivery Fee (Rs.)</label>
      <input class="fi" id="sDelFee" type="number" min="0" placeholder="100" value="${SETTINGS.deliveryFee}">
      <small>Added to the cart total during checkout.</small>
    </div>
    <button class="btn btn-rose" style="margin-top:0.5rem;" onclick="saveStoreSettings()">Save Settings ✓</button>
  </div>`;
}

function saveStoreSettings() {
  SETTINGS.esewaNumber = document.getElementById('sEsewa').value.trim();
  SETTINGS.deliveryFee = parseInt(document.getElementById('sDelFee').value) || 0;
  saveAllData();
  toast('Settings saved successfully');
}

function statusChip(s) {
  if (s==='Processing')      return `<span class="chip chip-amber">⏳ Processing</span>`;
  if (s==='Out for Delivery') return `<span class="chip chip-blue">🛵 Out for Delivery</span>`;
  if (s==='Delivered')       return `<span class="chip chip-green">✅ Delivered</span>`;
  return `<span class="chip chip-gray">${s}</span>`;
}

function updateStatus(id, status) {
  const o = orders.find(x=>x.id===id);
  if (o) { o.status=status; saveOrders(); toast(`Order ${id} → ${status}`); }
}

function openModal(id) {
  editingId = id;
  const p = id ? PRODUCTS.find(x=>x.id===id) : null;
  const v = (f, fallback='') => p ? (p[f] ?? fallback) : fallback;

  const el = document.createElement('div');
  el.className = 'overlay';
  el.id = 'prodOverlay';
  el.innerHTML = `
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-ttl">${p ? '✏️ Edit Bouquet' : '🌸 Add New Bouquet'}</div>
        <div class="modal-sub">${p ? `Editing: ${p.name}` : 'Fill in the details below'}</div>
      </div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Bouquet Image</label>
        <div class="img-preview-row">
          <div class="img-prev-box" id="imgBox">
            ${p && p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-size:2rem;">${v('emoji','🌸')}</span>`}
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;">
            <label style="display:inline-flex;align-items:center;gap:0.4rem;background:var(--rose-dim);color:var(--rose);border:none;padding:0.4rem 0.8rem;border-radius:6px;font-size:0.75rem;font-weight:600;cursor:pointer;">
              📷 Upload from device
              <input type="file" accept="image/*" id="fImageFile" style="display:none;" onchange="handleImageUpload(this)">
            </label>
            <div style="font-size:0.68rem;color:var(--text-faint);">or paste a URL below</div>
          </div>
        </div>
        <input class="fi" id="fImageUrl" type="url" placeholder="https://... (optional)" value="${v('imageUrl')}" oninput="previewImg(this.value)">
        <small id="uploadStatus" style="color:var(--green);display:none;">✓ Image uploaded</small>
      </div>

      <div class="form-row">
        <div class="fg"><label>Bouquet Name *</label><input class="fi" id="fName" type="text" placeholder="e.g. Pink Dream" value="${v('name')}"></div>
        <div class="fg"><label>Emoji / Icon</label><input class="fi" id="fEmoji" type="text" placeholder="🌸" value="${v('emoji','🌸')}" oninput="updateEmojiBox(this.value)"></div>
      </div>

      <div class="form-row">
        <div class="fg">
          <label>Category *</label>
          <select class="fi" id="fCat">
            ${['anniversary','birthday','wedding','sympathy','custom'].map(c=>`<option value="${c}" ${v('cat')===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>Badge Label <span style="font-weight:400;text-transform:none;font-size:0.68rem;">(optional)</span></label><input class="fi" id="fBadge" type="text" placeholder="Bestseller / New" value="${v('badge','')}"></div>
      </div>

      <div class="form-row">
        <div class="fg"><label>Stock Quantity *</label><input class="fi" id="fStock" type="number" min="0" placeholder="20" value="${v('stock',20)}"><small>Set to 0 → "Out of Stock"</small></div>
        <div class="fg"><label>Price (Rs.) *</label><input class="fi" id="fPrice" type="number" min="0" placeholder="850" value="${v('price', v('base', ''))}"></div>
      </div>

      <div class="fg">
        <label>Description</label>
        <textarea class="fi" id="fDesc" placeholder="Describe this knitted creation...">${v('desc')}</textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-rose" onclick="saveProduct()">${p ? 'Save Changes ✓' : 'Add Bouquet 🌸'}</button>
    </div>
  </div>`;

  document.body.appendChild(el);
  el.addEventListener('click', e => { if (e.target===el) closeModal(); });
}

function closeModal() {
  const m = document.getElementById('prodOverlay');
  if (m) m.remove();
}

function previewImg(url) {
  const box = document.getElementById('imgBox');
  if (!box) return;
  if (url) box.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<span style=font-size:2rem;>❌</span>'">`;
  else { const emoji = (document.getElementById('fEmoji')||{}).value || '🌸'; box.innerHTML = `<span style="font-size:2rem;">${emoji}</span>`; }
}

function updateEmojiBox(emoji) {
  const url = (document.getElementById('fImageUrl')||{}).value;
  if (!url) { const box = document.getElementById('imgBox'); if (box) box.innerHTML = `<span style="font-size:2rem;">${emoji}</span>`; }
}

async function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const box = document.getElementById('imgBox');
    if (box) box.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
  };
  reader.readAsDataURL(file);

  const status = document.getElementById('uploadStatus');
  toast('Uploading image…');

  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const filename = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const resp = await fetch(WORKER_UPLOAD, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: WORKER_PASSWORD, filename, imageBase64: base64 }), });
    const result = await resp.json();
    if (result.ok) {
      document.getElementById('fImageUrl').value = result.url;
      if (status) status.style.display = 'block';
      toast('Image uploaded ✓');
    } else toast(`Upload failed: ${result.error}`, true);
  } catch(e) {
    toast('Upload failed — try a URL instead', true);
  }
}

function saveProduct() {
  const name    = document.getElementById('fName').value.trim();
  const emoji   = document.getElementById('fEmoji').value.trim() || '🌸';
  const cat     = document.getElementById('fCat').value;
  const badge   = document.getElementById('fBadge').value.trim() || null;
  const stock   = parseInt(document.getElementById('fStock').value) || 0;
  const price   = parseInt(document.getElementById('fPrice').value);
  const desc    = document.getElementById('fDesc').value.trim();
  const imageUrl = document.getElementById('fImageUrl').value.trim();

  if (!name) { toast('Bouquet name is required', true); return; }
  if (isNaN(price)) { toast('Price is required', true); return; }

  const newProd = { id: editingId || Date.now(), name, emoji, cat, badge, stock, desc, imageUrl, price, base: price };

  if (editingId) {
    const idx = PRODUCTS.findIndex(p=>p.id===editingId);
    if (idx !== -1) PRODUCTS[idx] = newProd;
    toast(`"${name}" updated ✓`);
  } else {
    PRODUCTS.push(newProd);
    toast(`"${name}" added to catalogue ✓`);
  }
  saveAllData();
  closeModal();
  showSection('products', false);
}

function deleteProduct(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if (!p) return;
  if (!confirm(`Delete "${p.name}"?\nThis cannot be undone.`)) return;
  PRODUCTS = PRODUCTS.filter(x=>x.id!==id);
  saveAllData();
  toast(`"${p.name}" deleted`);
  showSection('products', false);
}

let toastTimer;
function toast(msg, isErr=false) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display='none'; }, 2600);
}
</script>
</body>
</html>
